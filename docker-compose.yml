version: '3.8'

services:
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: autofill-opensearch
    environment:
      - cluster.name=autofill-cluster
      - node.name=autofill-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - 9200:9200
      - 9600:9600
    networks:
      - autofill-net

networks:
  autofill-net:
    driver: bridge
